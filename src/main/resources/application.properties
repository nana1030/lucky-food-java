# サーバーポート設定（Render用）
server.port=${PORT:8080}

# アプリ名
spring.application.name=birthday

# DBを完全に無効化
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# AI設定
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini

# ★トラブル回避設定
# リトライを禁止して、認証の競合エラーを回避する
spring.ai.openai.retry.max-attempts=0

# --- 通信デバッグ用設定（エラー詳細を確認するため） ---
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.org.springframework.web.client.DefaultResponseErrorHandler=DEBUG
logging.level.org.springframework.web.client.HttpMessageConverter=DEBUG