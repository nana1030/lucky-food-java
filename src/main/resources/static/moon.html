<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>リアルタイム・ムーン</title>
    <link rel="stylesheet" href="/css/moonlight.css">
    <style>
        /* 深宇宙をイメージしたグラデーション背景 */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0b1528 0%, #030509 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #e0e6ed;
            font-family: 'Times New Roman', serif;
        }
        
        body::before {
		    content: "";
		    position: fixed;
		    top: -200px;
		    left: -200px;
		    width: 600px;
		    height: 600px;
		    background: radial-gradient(circle, rgba(126, 232, 162, 0.15), #004aff1c 70%);
		    filter: blur(40px);
		}
		
		body::after {
		  content: "";
		  position: fixed;
		  bottom: -200px;
		  right: -200px;
		  width: 600px;
		  height: 600px;
		  background: radial-gradient(circle, rgba(86, 200, 232, 0.10), #0e89e124 70%);
		  filter: blur(60px);
		}

        /* 🌟 背景の星コンテナ */
        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* 🌟 共通の星スタイル */
        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            pointer-events: none;
        }

        /* 💡 【強化】星が激しくまばゆいきらめきを放つアニメーション */
        @keyframes intenseTwinkle {
            0% { opacity: 0.1; transform: scale(0.5); filter: blur(0.5px); }
            50% { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 6px rgba(255,255,255,1)); }
            100% { opacity: 0.3; transform: scale(0.7); }
        }

        /* 💡 【新機能】宇宙空間の立体的な動き（ゆっくりと回る・迫るような移動） */
        @keyframes spaceLayer1 {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(2deg) scale(1.05); }
        }
        @keyframes spaceLayer2 {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(-3deg) scale(1.08); }
        }

        /* ☄️ 流れ星のスタイル */
        .shooting-star {
            position: absolute;
            width: 120px;
            height: 2px;
            background: linear-gradient(-45deg, #ffffff, rgba(255, 255, 255, 0));
            filter: drop-shadow(0 0 8px #ffffff);
            pointer-events: none;
            opacity: 0;
            animation: shooting 1.2s ease-out forwards;
            z-index: 2;
        }

        @keyframes shooting {
            0% { transform: rotate(-35deg) translateX(0); opacity: 1; }
            100% { transform: rotate(-35deg) translateX(400px); opacity: 0; }
        }

        h1 { 
            margin-left: 0 0 0 16px;
            margin-bottom: 5px; 
            font-weight: 300; 
            letter-spacing: 6px; 
            z-index: 10; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 200, 0.4);
        }
        
        #date { 
            margin-bottom: 40px; 
            color: #657786; 
            z-index: 10; 
            font-family: sans-serif; 
            font-size: 14px; 
            letter-spacing: 1px;
        }
        

        /* 🌙 こだわりのクレーター月のデザインベース */
        .moon-container {
            position: relative;
            width: 220px;
            height: 220px;
            z-index: 10;
        }

        .moon {
		    width: 100%;
		    height: 100%;
		    border-radius: 50%;
		    
		    background: 
		        radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 40%), 
		        radial-gradient(circle at 70% 60%, rgba(0, 0, 0, 0.15) 0%, transparent 30%), 
		        radial-gradient(circle at 40% 70%, rgba(0, 0, 0, 0.2) 0%, transparent 25%), 
		        url('images/moon_img.png');
		    
		    background-size: cover;
		    background-position: center;
		    background-repeat: no-repeat;
		    background-blend-mode: overlay;
		    box-shadow: 0 0 30px rgb(236 231 212 / 32%), 0 0 20px rgba(236, 231, 212, 0.2), inset -15px -15px 30px rgba(0, 0, 0, 0.4), inset 15px 15px 30px rgba(255, 255, 255, 0.6);
		        
		    position: relative;
		    overflow: hidden;

            /* 🌟 【ここを追加】最初（出現前）は奥に小さく、透明にしておきます */
            transform: scale(0.1);
            opacity: 0;

		    /* 🌟 もともとあった transition を、ズームインが滑らかに気持ちよく動くように少しリッチにします */
		    transition: transform 2.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 2.0s ease-out, left 1.5s ease;
		}
		
		.moonizon {display: inline-block;
	   	 	transform: rotate(27deg);
	    }

        /* 月の影 */
        .moon-shadow {
            position: absolute;
            top: -10%;
            left: 0;
            width: 120%;
            height: 120%;
            border-radius: 50%;
            background-color: #030509;
            filter: blur(5px);
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #info { 
            margin-top: 50px; 
            font-size: 15px; 
            z-index: 10; 
            background: rgba(255,255,255,0.05); 
            padding: 8px 24px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            font-family: sans-serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="starfield"></div>

    <h1>MOON<span class = "moonizon">&nbsp;☽</span></h1>
    <div id="date"></div>

    <div class="moon-container">
        <div class="moon">
            <div id="moonShadow" class="moon-shadow"></div>
        </div>
    </div>

    <div id="info">Loading...</div>

   <script>
    window.onload = function() {
        // 1. 日付の設定
        const today = new Date();
        document.getElementById("date").innerText = today.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

        // 2. 💡 立体感のある3層の星空を生成
        create3DStarfield();

        // 3. 流れ星を定期的に流すループを起動
        setInterval(launchShootingStar, 4000);

        // 4. Javaから月齢データを取得
        fetch('/api/moon')
            .then(response => response.json())
            .then(data => {
                const age = data.phase;
                
                let phaseName = "三日月";
                if (age < 2) phaseName = "新月 (New Moon)";
                else if (age >= 6 && age <= 9) phaseName = "上弦の月 (First Quarter)";
                else if (age >= 13 && age <= 16) phaseName = "満月 (Full Moon)";
                else if (age >= 21 && age <= 24) phaseName = "下弦の月 (Last Quarter)";
                else if (age > 16) phaseName = "二十六夜月（下弦に向かう月）";
                
                document.getElementById("info").innerText = `月齢: ${age} / ${phaseName}`;
                updateMoonAppearance(age);

                // 🌟【新機能】データ取得が成功したら、要素を本来のサイズ(scale 1, 不透明度 1)にして手前に迫らせる
                const moonEl = document.querySelector(".moon");
                if (moonEl) {
                    setTimeout(() => {
                        moonEl.style.transform = "scale(1)";
                        moonEl.style.opacity = "1";
                    }, 200); // 0.2秒だけタメを作ってからアニメーションを開始
                }
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById("info").innerText = "FAILED TO LOAD";
            });
    };

    // 🌟 💡 立体的な星空を作る新しい関数
    function create3DStarfield() {
        const starfield = document.getElementById("starfield");
        
        // 宇宙空間を「奥（Layer1）」「手前（Layer2）」の2つの動く層に分けるためのコンテナを作る
        const layer1 = document.createElement("div");
        const layer2 = document.createElement("div");
        
        layer1.style.position = "absolute";
        layer1.style.width = "110vw"; layer1.style.height = "110vh";
        layer1.style.top = "-5vh"; layer1.style.left = "-5vw";
        layer1.style.animation = "spaceLayer1 30s ease-in-out infinite alternate";
        
        layer2.style.position = "absolute";
        layer2.style.width = "120vw"; layer2.style.height = "120vh";
        layer2.style.top = "-10vh"; layer2.style.left = "-10vw";
        layer2.style.animation = "spaceLayer2 20s ease-in-out infinite alternate";

        starfield.appendChild(layer1);
        starfield.appendChild(layer2);

        // Layer1: 奥の小さな星（たくさん）
        generateStarsInLayer(layer1, 80, 1, 1.8);
        // Layer2: 手前の大きくて強い星（少なめ、動きが大きくなる）
        generateStarsInLayer(layer2, 40, 2, 3.5);
    }

    // 各レイヤーに星を散りばめるヘルパー関数
    function generateStarsInLayer(layer, count, minSize, maxSize) {
        for (let i = 0; i < count; i++) {
            const star = document.createElement("div");
            star.className = "star";
            
            const size = Math.random() * (maxSize - minSize) + minSize;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            
            // 💡 星の色にわずかなバリエーションを持たせる（青白い星、黄色い星）
            const colors = ["#8ce87e", "#e47ee8", "#e0f7fa", "#fffde7"];
            star.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            // 💡 きらめきのアニメーションを設定
            const duration = Math.random() * 2 + 1.5; // さらにきらきら動くように高速化 (1.5〜3.5秒)
            const delay = Math.random() * 4;
            star.style.animation = `intenseTwinkle ${duration}s ease-in-out infinite alternate`;
            star.style.animationDelay = `${delay}s`;
            
            layer.appendChild(star);
        }
    }

    // 流れ星をランダムな位置に生成して流す関数
    function launchShootingStar() {
        if (Math.random() > 0.3) {
            const starfield = document.getElementById("starfield");
            const shootingStar = document.createElement("div");
            shootingStar.className = "shooting-star";

            shootingStar.style.top = `${Math.random() * 40}vh`;
            shootingStar.style.left = `${Math.random() * 70}vw`;

            starfield.appendChild(shootingStar);

            setTimeout(() => {
                shootingStar.remove();
            }, 1200);
        }
    }

    // 月の影を動かすロジック
    function updateMoonAppearance(age) {
        const shadow = document.getElementById("moonShadow");
        let pct = 0;
        if (age <= 15) {
            pct = (15 - age) / 15 * 100;
            shadow.style.left = `${110 - pct}%`;
        } else {
            pct = (age - 15) / 15 * 100;
            shadow.style.left = `-${110 - pct}%`;
        }
        if(age === 0 || age >= 29.5) {
            shadow.style.left = "-10%";
            shadow.style.width = "120%";
        }
    }
</script>
</body>
</html>
