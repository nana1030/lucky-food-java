<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>リアルタイム・ムーン</title>
    <link rel="stylesheet" href="/css/moonlight.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #0b1528 0%, #030509 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #e0e6ed;
            font-family: 'Times New Roman', serif;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(126, 232, 162, 0.15), #004aff1c 70%);
            filter: blur(40px);
        }
        
        body::after {
            content: "";
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(86, 200, 232, 0.10), #0e89e124 70%);
            filter: blur(60px);
        }

        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes intenseTwinkle {
            0% { opacity: 0.1; transform: scale(0.5); filter: blur(0.5px); }
            50% { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 6px rgba(255,255,255,1)); }
            100% { opacity: 0.3; transform: scale(0.7); }
        }

        @keyframes spaceLayer1 { from { transform: rotate(0deg) scale(1); } to { transform: rotate(2deg) scale(1.05); } }
        @keyframes spaceLayer2 { from { transform: rotate(0deg) scale(1); } to { transform: rotate(-3deg) scale(1.08); } }

        .shooting-star {
            position: absolute;
            width: 120px;
            height: 2px;
            background: linear-gradient(-45deg, #ffffff, rgba(255, 255, 255, 0));
            filter: drop-shadow(0 0 8px #ffffff);
            pointer-events: none;
            opacity: 0;
            animation: shooting 1.2s ease-out forwards;
            z-index: 2;
        }

        @keyframes shooting {
            0% { transform: rotate(-35deg) translateX(0); opacity: 1; }
            100% { transform: rotate(-35deg) translateX(400px); opacity: 0; }
        }

        h1 { 
            margin: 0 0 5px 16px;
            font-weight: 300; 
            letter-spacing: 6px; 
            z-index: 10; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 200, 0.4);
        }
        
        #date { 
            margin-bottom: 40px; 
            color: #657786; 
            z-index: 10; 
            font-family: sans-serif; 
            font-size: 14px; 
            letter-spacing: 1px;
        }

        .moon-container {
            position: relative;
            width: 220px;
            height: 220px;
            z-index: 10;
            border-radius: 50%;
            overflow: hidden; 
            -webkit-mask-image: radial-gradient(circle, white 100%, black 100%);
            mask-image: radial-gradient(circle, white 100%, black 100%);
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .moon {
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 40%), 
                radial-gradient(circle at 70% 60%, rgba(0, 0, 0, 0.15) 0%, transparent 30%), 
                radial-gradient(circle at 40% 70%, rgba(0, 0, 0, 0.2) 0%, transparent 25%), 
                url('images/moon_img.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-blend-mode: overlay;
            box-shadow: 0 0 30px rgb(236 231 212 / 32%), 0 0 20px rgba(236, 231, 212, 0.2), inset -15px -15px 30px rgba(0, 0, 0, 0.4), inset 15px 15px 30px rgba(255, 255, 255, 0.6);
            position: relative;
        }
        
        .moonizon { display: inline-block; transform: rotate(27deg); }

        .moon-shadow {
            position: absolute;
            top: -10%;
            left: 0;
            width: 120%;
            height: 120%;
            border-radius: 50%;
            background-color: #030509;
            filter: blur(5px);
        }

        #info { 
            margin-top: 50px; 
            font-size: 15px; 
            z-index: 10; 
            background: rgba(255,255,255,0.05); 
            padding: 8px 24px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            font-family: sans-serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="starfield"></div>
    <h1>MOON<span class="moonizon">&nbsp;☽</span></h1>
    <div id="date"></div>

    <div class="moon-container">
        <div class="moon">
            <div id="moonShadow" class="moon-shadow"></div>
        </div>
    </div>

    <div id="info">Loading...</div>

   <script>
    window.onload = function() {
        const today = new Date();
        document.getElementById("date").innerText = today.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

        create3DStarfield();
        setInterval(launchShootingStar, 4000);

        fetch('/api/moon')
            .then(response => response.json())
            .then(data => {
                const age = data.phase;
                let phaseName = age < 2 ? "新月 (New Moon)" :
                                age >= 6 && age <= 9 ? "上弦の月 (First Quarter)" :
                                age >= 13 && age <= 16 ? "満月 (Full Moon)" :
                                age >= 21 && age <= 24 ? "下弦の月 (Last Quarter)" :
                                "二十六夜月（下弦に向かう月）";
                
                document.getElementById("info").innerText = `月齢: ${age} / ${phaseName}`;
                updateMoonAppearance(age);
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById("info").innerText = "FAILED TO LOAD";
            });
    };

    function create3DStarfield() {
        const starfield = document.getElementById("starfield");
        const layer1 = document.createElement("div");
        const layer2 = document.createElement("div");
        layer1.style.cssText = "position:absolute; width:110vw; height:110vh; top:-5vh; left:-5vw; animation:spaceLayer1 30s ease-in-out infinite alternate;";
        layer2.style.cssText = "position:absolute; width:120vw; height:120vh; top:-10vh; left:-10vw; animation:spaceLayer2 20s ease-in-out infinite alternate;";
        starfield.appendChild(layer1);
        starfield.appendChild(layer2);
        generateStarsInLayer(layer1, 80, 1, 1.8);
        generateStarsInLayer(layer2, 40, 2, 3.5);
    }

    function generateStarsInLayer(layer, count, minSize, maxSize) {
        for (let i = 0; i < count; i++) {
            const star = document.createElement("div");
            star.className = "star";
            const size = Math.random() * (maxSize - minSize) + minSize;
            star.style.cssText = `width:${size}px; height:${size}px; top:${Math.random()*100}%; left:${Math.random()*100}%; animation:intenseTwinkle ${Math.random()*2+1.5}s ease-in-out infinite alternate; animation-delay:${Math.random()*4}s;`;
            star.style.backgroundColor = ["#8ce87e", "#e47ee8", "#e0f7fa", "#fffde7"][Math.floor(Math.random()*4)];
            layer.appendChild(star);
        }
    }

    function launchShootingStar() {
        if (Math.random() > 0.3) {
            const starfield = document.getElementById("starfield");
            const s = document.createElement("div");
            s.className = "shooting-star";
            s.style.cssText = `top:${Math.random()*40}vh; left:${Math.random()*70}vw;`;
            starfield.appendChild(s);
            setTimeout(() => s.remove(), 1200);
        }
    }

    function updateMoonAppearance(age) {
        const shadow = document.getElementById("moonShadow");
        let pct = (age <= 15) ? (15 - age) / 15 * 100 : (age - 15) / 15 * 100;
        shadow.style.left = (age <= 15) ? `${110 - pct}%` : `-${110 - pct}%`;
        if(age === 0 || age >= 29.5) { shadow.style.left = "-10%"; shadow.style.width = "120%"; }
    }
</script>
</body>
</html>
